name: Job Search Bot 🤖

on:
  schedule:
    - cron: "30 3 * * *"   # هر روز ساعت ۷ صبح ایران (۳:۳۰ UTC)
  workflow_dispatch:         # اجرای دستی از تب Actions

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # رفع اخطار Node.js

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # ─── بازیابی کش seen_jobs.txt از اجرای قبلی ──────────────────────────
      - name: 📦 Restore seen jobs cache
        uses: actions/cache@v4
        with:
          path: seen_jobs.txt
          # کلید منحصربه‌فرد برای هر run — همیشه ذخیره میشه
          key: seen-jobs-${{ github.run_id }}
          # بازیابی از آخرین کش موجود
          restore-keys: |
            seen-jobs-

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install dependencies
        run: pip install requests gspread google-auth

      - name: 🤖 Run Job Search Bot
        env:
          RAPIDAPI_KEY:        ${{ secrets.6e98b3e19fmshbe9214fdee2b8dbp1b13d3jsn324012f89ca8}}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.AAEUb8BGVn9s5yuWE050Rm2rX1g3Nq8g9nc }}
          TELEGRAM_CHAT_ID:    ${{ secrets.83417067 }}
          GSHEET_CREDENTIALS:  ${{ secrets.GSHEET_CREDENTIALS }}
          GSHEET_ID:           ${{ secrets.GSHEET_ID }}
        run: python bot.py
